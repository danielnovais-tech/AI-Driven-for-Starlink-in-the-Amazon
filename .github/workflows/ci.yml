name: CI

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

# Minimal permissions for all jobs in this workflow
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 src/ tests/ \
            --max-line-length=110 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__

  # ---------------------------------------------------------------------------
  # Unit tests (no GPU, no torch-geometric)
  # ---------------------------------------------------------------------------
  test-unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ matrix.python-version }}-

      - name: Install dependencies (CPU-only torch)
        run: |
          pip install --upgrade pip
          pip install \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            torch>=2.0.0
          pip install numpy pandas gymnasium h5py scipy pytest

      - name: Install package
        run: pip install -e .

      - name: Run unit tests (torch-independent)
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_agents.py \
            --ignore=tests/test_datasets.py \
            -q --tb=short

  # ---------------------------------------------------------------------------
  # Integration tests
  # ---------------------------------------------------------------------------
  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: test-unit

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            torch>=2.0.0
          pip install numpy pandas gymnasium h5py scipy pytest

      - name: Install package
        run: pip install -e .

      - name: Run integration tests
        run: |
          python -m pytest tests/test_integration.py -v --tb=short

  # ---------------------------------------------------------------------------
  # Docker build smoke-test
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: test-unit

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg TORCH_INDEX=https://download.pytorch.org/whl/cpu \
            -t ai-starlink-amazon:ci .

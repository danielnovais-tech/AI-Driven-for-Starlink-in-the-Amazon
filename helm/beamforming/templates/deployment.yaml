apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "beamforming.fullname" . }}
  labels:
    {{- include "beamforming.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "beamforming.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "beamforming.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "beamforming.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ if .Values.image.registry }}{{ .Values.image.registry }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: LOG_LEVEL
              value: {{ .Values.controller.logLevel | quote }}
            - name: DEVICE
              value: {{ .Values.controller.device | quote }}
            - name: SNR_THRESHOLD_DB
              value: {{ .Values.controller.snrThresholdDb | quote }}
            - name: STEP_INTERVAL_MS
              value: {{ .Values.controller.stepIntervalMs | quote }}
            - name: MODEL_REGISTRY_PATH
              value: {{ .Values.controller.modelRegistryPath | quote }}
            - name: PYTHONPATH
              value: "/app/src"
            {{- if .Values.dataSources.cptec.enabled }}
            - name: CPTEC_BASE_URL
              value: {{ .Values.dataSources.cptec.baseUrl | quote }}
            - name: CPTEC_REFRESH_INTERVAL_S
              value: {{ .Values.dataSources.cptec.refreshIntervalS | quote }}
            {{- end }}
            {{- if .Values.dataSources.spacetrack.enabled }}
            # NOTE: For higher-security deployments, consider mounting the
            # 'spacetrack-credentials' secret as a volume instead of env vars,
            # then reading credentials from the mounted file path.  Environment
            # variables are visible in 'kubectl describe pod' output.
            - name: SPACETRACK_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dataSources.spacetrack.credentialsSecret }}
                  key: username
            - name: SPACETRACK_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dataSources.spacetrack.credentialsSecret }}
                  key: password
            - name: SPACETRACK_REFRESH_INTERVAL_S
              value: {{ .Values.dataSources.spacetrack.refreshIntervalS | quote }}
            {{- end }}
            {{- if .Values.dataSources.networkTraffic.enabled }}
            - name: TRAFFIC_ENDPOINT_URL
              value: {{ .Values.dataSources.networkTraffic.endpointUrl | quote }}
            - name: TRAFFIC_REFRESH_INTERVAL_S
              value: {{ .Values.dataSources.networkTraffic.refreshIntervalS | quote }}
            {{- end }}
            {{- if .Values.controller.explainability.enabled }}
            - name: EXPLAINABILITY_ENABLED
              value: "true"
            - name: EXPLAINABILITY_METHOD
              value: {{ .Values.controller.explainability.method | quote }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: models
              mountPath: {{ .Values.persistence.mountPath }}
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: models
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "beamforming.fullname" . }}-models
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

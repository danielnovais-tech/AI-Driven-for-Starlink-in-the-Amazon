{{- if .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "beamforming.fullname" . }}
  labels:
    {{- include "beamforming.labels" . | nindent 4 }}
    {{- with .Values.prometheusRule.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: beamforming.availability
      interval: 30s
      rules:
        # ----------------------------------------------------------------
        # Outage rate alert: fires when >X% of steps are in outage for Y min
        # ----------------------------------------------------------------
        - alert: BeamformingHighOutageRate
          expr: |
            (
              rate(outages_total[5m])
              / rate(decisions_total[5m])
            ) > {{ .Values.prometheusRule.outageRateThreshold }}
          for: {{ .Values.prometheusRule.outageRateDuration }}
          labels:
            severity: critical
          annotations:
            summary: "High outage rate on beamforming controller"
            description: >
              The outage rate has exceeded
              {{ .Values.prometheusRule.outageRateThreshold | mul 100 }}%
              for the past {{ .Values.prometheusRule.outageRateDuration }}.
              Current value: {{ "{{" }} $value | humanizePercentage {{ "}}" }}.

        # ----------------------------------------------------------------
        # Inference latency alert
        # ----------------------------------------------------------------
        - alert: BeamformingHighInferenceLatency
          expr: |
            histogram_quantile(0.95, rate(inference_latency_ms_bucket[5m]))
              > {{ .Values.prometheusRule.latencyP95ThresholdMs }}
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "95th-percentile inference latency above budget"
            description: >
              The 95th-percentile inference latency is
              {{ "{{" }} $value | humanize {{ "}}" }} ms,
              above the {{ .Values.prometheusRule.latencyP95ThresholdMs }} ms threshold.

        # ----------------------------------------------------------------
        # Fallback policy activation (agent health)
        # ----------------------------------------------------------------
        - alert: BeamformingAgentFallback
          expr: |
            rate(fallback_total[10m]) > {{ .Values.prometheusRule.fallbackRateThreshold }}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Beamforming agent using fallback policy"
            description: >
              The fallback policy has been activated more than
              {{ .Values.prometheusRule.fallbackRateThreshold }} times/second
              in the last 10 minutes.  Check agent health.

        # ----------------------------------------------------------------
        # SNR warning
        # ----------------------------------------------------------------
        - alert: BeamformingLowSNR
          expr: snr_db < {{ .Values.prometheusRule.snrWarningThresholdDb }}
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Low SNR detected on beamforming controller"
            description: >
              Current SNR is {{ "{{" }} $value {{ "}}" }} dB,
              below the {{ .Values.prometheusRule.snrWarningThresholdDb }} dB threshold.
{{- end }}

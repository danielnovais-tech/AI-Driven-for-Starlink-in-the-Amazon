apiVersion: v2
name: beamforming
description: |
  Helm chart for deploying the Starlink Amazon cognitive beamforming
  inference service on Kubernetes.

  Deploys:
    - Inference controller Deployment (one replica per satellite cluster)
    - Federated Aggregator Deployment + Service (FL pipeline)
    - Prometheus metrics Service (port 9090)
    - Horizontal Pod Autoscaler (CPU-based)
    - PodDisruptionBudget (HA during rolling upgrades)
    - ConfigMap for runtime parameters
    - ServiceAccount with minimal RBAC

type: application
version: 0.3.0
appVersion: "0.3.0"

keywords:
  - satellite
  - beamforming
  - reinforcement-learning
  - leo
  - amazon

maintainers:
  - name: AI Starlink Amazon Team

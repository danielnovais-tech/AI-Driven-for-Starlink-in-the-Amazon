# Default values for the beamforming inference service.
# Override with: helm install beamforming ./helm/beamforming -f custom-values.yaml

# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------
image:
  # Fully qualified image reference.
  # Override with your registry, e.g.:
  #   registry: ghcr.io/your-org
  #   repository: ai-starlink-amazon
  # Produces: ghcr.io/your-org/ai-starlink-amazon:0.2.0
  registry: ""   # leave empty to use Docker Hub; set to "ghcr.io/your-org" etc.
  repository: ai-starlink-amazon
  tag: "0.3.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ---------------------------------------------------------------------------
# Deployment
# ---------------------------------------------------------------------------
replicaCount: 2  # At least 2 for high availability (Phase 2.2)

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ---------------------------------------------------------------------------
# Container resources
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

# ---------------------------------------------------------------------------
# Controller runtime configuration
# ---------------------------------------------------------------------------
controller:
  # Inference step interval (milliseconds); maps to STEP_INTERVAL_MS env var
  stepIntervalMs: 500
  # SNR threshold for outage detection (dB)
  snrThresholdDb: 5.0
  # Torch device: "cpu" or "cuda"
  device: cpu
  # Log level: DEBUG | INFO | WARNING | ERROR
  logLevel: INFO
  # Model registry path (PVC mount point)
  modelRegistryPath: /models

# ---------------------------------------------------------------------------
# Metrics service (Prometheus scrape target)
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  metricsPort: 9090

# ---------------------------------------------------------------------------
# Horizontal Pod Autoscaler
# ---------------------------------------------------------------------------
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# ---------------------------------------------------------------------------
# Liveness / readiness probes
# ---------------------------------------------------------------------------
livenessProbe:
  exec:
    command:
      - python
      - -c
      - "import inference.online_controller"
  initialDelaySeconds: 10
  periodSeconds: 30
  failureThreshold: 3

readinessProbe:
  exec:
    command:
      - python
      - -c
      - "import inference.online_controller"
  initialDelaySeconds: 5
  periodSeconds: 15

# ---------------------------------------------------------------------------
# Persistent volume for model registry
# ---------------------------------------------------------------------------
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi
  mountPath: /models

# ---------------------------------------------------------------------------
# Node scheduling
# ---------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Periodic retraining CronJob
# ---------------------------------------------------------------------------
retraining:
  enabled: true
  # Weekly on Sunday at 02:00 UTC
  schedule: "0 2 * * 0"
  modelName: ppo_amazon
  # Number of validation episodes per retrain cycle
  nEpisodes: 50
  # Federated learning rounds per cycle
  federatedRounds: 5
  # Maximum outage probability required for promotion (1.0 = always promote)
  outageThreshold: 1.0
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

# ---------------------------------------------------------------------------
# Prometheus alerting rules (requires prometheus-operator CRD)
# ---------------------------------------------------------------------------
prometheusRule:
  enabled: false   # set to true when prometheus-operator is installed
  # Additional labels to select which Prometheus instance picks up the rule
  additionalLabels:
    prometheus: kube-prometheus
  # Outage rate > this fraction for outageRateDuration → critical alert
  outageRateThreshold: 0.15
  outageRateDuration: "5m"
  # 95th-percentile latency above this (ms) → warning alert
  latencyP95ThresholdMs: 400
  # Fallback activations/s above this → warning alert
  fallbackRateThreshold: 0.1
  # SNR below this (dB) → warning alert
  snrWarningThresholdDb: 5.0

# ---------------------------------------------------------------------------
# Grafana dashboard (injected as ConfigMap with grafana_dashboard=1 label)
# ---------------------------------------------------------------------------
grafana:
  enabled: false   # set to true when Grafana sidecar is configured

# ---------------------------------------------------------------------------
# Federated Aggregator (Phase 2 – FL pipeline)
# ---------------------------------------------------------------------------
federatedAggregator:
  enabled: true
  # Number of federated rounds per retraining cycle
  rounds: 5
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

# ---------------------------------------------------------------------------
# PodDisruptionBudget (ensures HA during node drain / upgrades)
# ---------------------------------------------------------------------------
podDisruptionBudget:
  enabled: true
  # Keep at least 1 inference pod running at all times
  minAvailable: 1

# ---------------------------------------------------------------------------
# Explainability (feature attribution per decision)
# ---------------------------------------------------------------------------
controller:
  explainability:
    enabled: false       # set to true to enable per-step explanations
    method: smooth_grad  # vanilla | ig | smooth_grad
